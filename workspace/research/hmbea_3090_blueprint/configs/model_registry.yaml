models:
  controller:
    provider: local
    family: dense-generalist
    backend_preference:
      - llama_cpp
      - vllm
    candidates:
      - name: ministral-3-14b
        quant: gguf-q4_k_m
        role_weight: 1.00
        notes: "Best default for local orchestration when you want strong structured outputs and broad competence."
      - name: qwen3-14b
        quant: gguf-q4_k_m
        role_weight: 0.95
        notes: "Excellent alternative if you prefer the Qwen ecosystem and YaRN-extended context."

  coder:
    provider: local
    family: code-agent
    backend_preference:
      - llama_cpp
      - tabbyapi
      - vllm
    candidates:
      - name: devstral-small-2
        quant: gguf-q4_k_m
        role_weight: 1.00
        notes: "Primary SWE specialist. Load on demand."
      - name: qwen3-coder-next
        quant: awq-or-gptq
        role_weight: 0.75
        notes: "Experimental. Strong upside, but not a safe first deployment on a 3090."

  critic:
    provider: local
    family: fast-reasoner
    backend_preference:
      - llama_cpp
      - vllm
    candidates:
      - name: phi-4-mini-flash-reasoning
        quant: gguf-q4_k_m
        role_weight: 1.00
        notes: "Cheap critique / triage / confidence estimation."
      - name: phi-4-reasoning
        quant: gguf-q4_k_m
        role_weight: 0.90
        notes: "Heavier but stronger critic when latency is less important."

  embeddings:
    provider: local
    family: retrieval
    backend_preference:
      - transformers
      - sentence_transformers
    candidates:
      - name: qwen3-embedding-0.6b
        notes: "Small multilingual embedding model for local retrieval."
      - name: qwen3-embedding-4b
        notes: "Upgrade only if retrieval quality justifies extra latency / memory."

  reranker:
    provider: local
    family: retrieval
    backend_preference:
      - transformers
    candidates:
      - name: qwen3-reranker-0.6b
        notes: "Default cross-encoder reranker."
      - name: qwen3-reranker-4b
        notes: "Use only if benchmarked improvement is material."

runtime_rules:
  single_gpu_policy:
    max_hot_heavy_models: 1
    target_context_default: 8192
    target_context_upper_bound: 32768
    prefer_hot_swap_over_parallel_heavy_models: true
    preserve_10_percent_vram_headroom: true

  escalation:
    remote_frontier_allowed: true
    remote_frontier_requires_trace_label: true
    capture_teacher_outputs_for_training: false

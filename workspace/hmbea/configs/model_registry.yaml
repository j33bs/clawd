# HMBEA Model Registry
# Uses existing models + hot-swap ready

models:
  controller:
    provider: local
    backend: llama_cpp
    url: http://localhost:8001/v1
    candidates:
      - name: local-assistant
        quant: gguf-q4_k_m
        role_weight: 1.00
        notes: "Qwen 3.5 27B - current default"

  coder:
    provider: local
    candidates:
      - name: local-assistant
        notes: "Same for now - hot-swap ready for qwen2.5-coder"

  critic:
    provider: local
    candidates:
      - name: local-assistant
        notes: "Same for now - hot-swap ready for phi-4-mini"

# Available in cache (ready to convert):
# - Qwen2.5-14B-Instruct-AWQ
# - Qwen2.5-Coder-14B-Instruct-AWQ

runtime:
  single_gpu: true
  hot_swap: true
  context: 262144

# HMBEA Escalation Policy

thresholds:
  accept_if:
    schema_valid: true
    critic_score_gte: 0.50
    groundedness_gte: 0.30
    tests_passed: true

  retry_if:
    critic_score_between: [0.30, 0.49]
    max_retries: 1

  escalate_if:
    critic_score_lt: 0.30

routing:
  low_difficulty:
    prefer_local_only: true
  medium_difficulty:
    local_then_critic: true
  high_difficulty:
    local_attempt_then_escalate: true

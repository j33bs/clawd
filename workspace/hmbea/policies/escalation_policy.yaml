# HMBEA Escalation Policy

thresholds:
  accept_if:
    schema_valid: true
    critic_score_gte: 0.80
    groundedness_gte: 0.75
    tests_passed: true

  retry_if:
    critic_score_between: [0.55, 0.79]
    max_retries: 1

  escalate_if:
    critic_score_lt: 0.55
    tool_error_count_gte: 2
    unsupported_domain: true
    destructive_action_requested: true
    uncertainty_high: true

routing:
  low_difficulty:
    prefer_local_only: true
  medium_difficulty:
    local_then_critic: true
  high_difficulty:
    local_attempt_then_escalate: true
